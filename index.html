<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<body>
    <p id="counter">0</p>
    <section class="addd">
        <button id="add" onclick="add_number()">+</button>
    </section>
    <br>
    <br>
    <br>
    <section class="upgrades">
        <button id="click_upgrade" onclick="click_upgrade()">click upgrade</button>
        <p id="click_upgrade_cost">cost: 10</p>
        <p id="current_multiplyer">current click power: 1</p>
        <br>
        <br>
        <button id="boost_click" onclick="boost_click()">boost click * 10 for 5 clicks</button>
        <p id="boost_click_cost">cost: 100</p>
        <p id="boost_clicks">remaining boost clicks: 0</p>
    </section>
    <br>
    <br>
    <section class="restart">
        <button id="restart" onclick="restart()">restart</button>
    </section>
